name: food-diary-app

services:
  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: container
      RELEASE_VERSION: compose-local
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      JWT_SECRET: change_me_in_production
      DB_PROVIDER: postgres
      DB_PATH: /data/app.db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nutritrack
      DB_USER: nutritrack
      DB_PASSWORD: nutritrack
      REDIS_URL: redis://redis:6379
      AUTO_MIGRATE_ON_BOOT: "true"
      SEED_DEMO_DATA: "true"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - nutritrack-data:/data

  migrate:
    build:
      context: .
      dockerfile: ./Dockerfile
    profiles:
      - ops
    command: ["node", "server/src/cli.js", "migrate"]
    environment:
      APP_ENV: container
      RELEASE_VERSION: compose-local
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      JWT_SECRET: change_me_in_production
      DB_PROVIDER: postgres
      DB_PATH: /data/app.db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: nutritrack
      DB_USER: nutritrack
      DB_PASSWORD: nutritrack
      REDIS_URL: redis://redis:6379
      AUTO_MIGRATE_ON_BOOT: "false"
      SEED_DEMO_DATA: "false"
    volumes:
      - nutritrack-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nutritrack
      POSTGRES_USER: nutritrack
      POSTGRES_PASSWORD: nutritrack
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutritrack -d nutritrack"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  nutritrack-data:
  postgres-data:
