name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node-test:
    name: Node ${{ matrix.node-version }} test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static client contracts
        run: npm run check:client

      - name: Run automated tests
        run: npm test

  coverage:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: node-test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate static client contracts
        run: npm run check:client

      - name: Run coverage suite
        run: |
          set -o pipefail
          mkdir -p artifacts
          npm run test:coverage | tee artifacts/test-coverage.txt

      - name: Upload coverage summary
        uses: actions/upload-artifact@v4
        with:
          name: coverage-summary
          path: artifacts/test-coverage.txt
          if-no-files-found: error
          retention-days: 14

  docker-validate:
    name: Docker validation
    runs-on: ubuntu-latest
    needs: node-test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker compose file
        run: docker compose config

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deploy/docker/server.Dockerfile
          push: false
          tags: food-diary-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
