name: CD

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  docker-publish:
    name: Publish multi-platform image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    outputs:
      image-ref: ghcr.io/${{ github.repository }}/food-diary-app:git-${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/food-diary-app
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
            type=raw,value=git-${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

  migrate-release:
    name: Run release migration command
    runs-on: ubuntu-latest
    needs: docker-publish

    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull published image
        run: docker pull ${{ needs.docker-publish.outputs.image-ref }}

      - name: Start PostgreSQL backing service
        run: |
          docker network create food-diary-release
          docker run -d \
            --name food-diary-release-postgres \
            --network food-diary-release \
            -e POSTGRES_DB=nutritrack_release \
            -e POSTGRES_USER=nutritrack \
            -e POSTGRES_PASSWORD=nutritrack \
            postgres:16-alpine

          for attempt in {1..30}; do
            if docker exec food-diary-release-postgres pg_isready -U nutritrack -d nutritrack_release; then
              exit 0
            fi
            sleep 2
          done

          docker logs food-diary-release-postgres
          exit 1

      - name: Run migration from published image
        run: >
          docker run --rm
          --network food-diary-release
          -e APP_ENV=release
          -e RELEASE_VERSION=${{ github.sha }}
          -e JWT_SECRET=release-secret
          -e DB_PROVIDER=postgres
          -e DB_HOST=food-diary-release-postgres
          -e DB_PORT=5432
          -e DB_NAME=nutritrack_release
          -e DB_USER=nutritrack
          -e DB_PASSWORD=nutritrack
          -e AUTO_MIGRATE_ON_BOOT=false
          -e SEED_DEMO_DATA=false
          ${{ needs.docker-publish.outputs.image-ref }}
          node server/src/cli.js migrate

      - name: Cleanup PostgreSQL backing service
        if: always()
        run: |
          docker rm -f food-diary-release-postgres || true
          docker network rm food-diary-release || true

  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    needs:
      - docker-publish
      - migrate-release
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured. Skipping Render deploy."
            exit 0
          fi

          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
