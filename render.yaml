services:
  - type: web
    name: nutritrack-app
    runtime: docker
    dockerfilePath: ./deploy/docker/server.Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: SERVER_PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /var/data/app.db
    disk:
      name: nutritrack-data
      mountPath: /var/data
      sizeGB: 1
