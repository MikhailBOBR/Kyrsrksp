services:
  - type: web
    name: nutritrack-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: RELEASE_VERSION
        value: render-release
      - key: SERVER_PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PROVIDER
        value: postgres
      - key: AUTO_MIGRATE_ON_BOOT
        value: true
      - key: SEED_DEMO_DATA
        value: true
      - key: SEED_LARGE_DATA
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: nutritrack-db
          property: connectionString

databases:
  - name: nutritrack-db
    databaseName: nutritrack
    user: nutritrack
