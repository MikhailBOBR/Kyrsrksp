services:
  - type: web
    name: nutritrack-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: RELEASE_VERSION
        value: render-release
      - key: SERVER_PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PROVIDER
        value: sqlite
      - key: DB_PATH
        value: /data/app.db
    disk:
      name: nutritrack-data
      mountPath: /data
      sizeGB: 1
